<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<div class="container mt-4">

  <h2 class="text-center mb-4">Student Management</h2>

  <!-- Form -->
  <div class="card p-3 mb-4 shadow">
    <div class="row g-3">
      
      <div class="col-md-4">
        <input type="text" [(ngModel)]="student.name" class="form-control" placeholder="Enter Name">
      </div>

      <div class="col-md-4">
        <input type="email" [(ngModel)]="student.email" class="form-control" placeholder="Enter Email">
      </div>

      <div class="col-md-4">
        <input type="text" [(ngModel)]="student.course" class="form-control" placeholder="Enter Course">
      </div>

      <div class="col-12 text-center">
        <button class="btn btn-success me-2" (click)="addStudent()">Add Student</button>
        <button class="btn btn-warning" (click)="updateStudent()">Update</button>
      </div>

    </div>
  </div>


  <div *ngIf="loading" class="text-center my-3">
  <div class="spinner-border text-primary"></div>
</div>

  <!-- Table -->
  <table class="table table-bordered table-hover shadow text-center">
    <thead class="table-dark">
      <tr>
        <th>Name</th>
        <th>Email</th>
        <th>Course</th>
        <th>Action</th>
      </tr>
    </thead>

    <tbody>
      <tr *ngFor="let s of students">
        <td>{{ s.name }}</td>
        <td>{{ s.email }}</td>
        <td>{{ s.course }}</td>

        <td>
          <button class="btn btn-primary btn-sm me-2" (click)="editStudent(s)">
  <i class="fa fa-pen"></i>
</button>

<button class="btn btn-danger btn-sm" (click)="confirmDelete(s.id)">
  <i class="fa fa-trash"></i>
</button>
        </td>
      </tr>
    </tbody>

  </table>

</div>
